[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "atlas"
version = "1.0.0"
description = "ATLAS: induce failure taxonomies from LLM-agent execution traces."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [
    { name = "Mert Cemri" },
]
keywords = ["multi-agent", "taxonomy", "llm", "failure-analysis", "agents"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "openai>=1.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
dev = ["pytest>=7", "pytest-cov>=4"]

[project.scripts]
atlas = "atlas.cli:main"

[project.urls]
Homepage = "https://github.com/multi-agent-systems-failure-taxonomy/ATLAS"

[tool.setuptools.packages.find]
include = ["atlas*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
